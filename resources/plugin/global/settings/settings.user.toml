FENCE_TEMPLATE = """
```markmap\r
---\r
# 根节点默认文本（若内容存在根节点，则此选项失效）\r
title: markmap\r
# 配置:\r
markmap:\r
  # 是否允许缩放\r
  zoom: false\r
  # 是否允许平移\r
  pan: false\r
  # 节点最大长度（0则无长度限制）\r
  maxWidth: 0\r
  # 节点水平间距\r
  spacingHorizontal: 80\r
  # 节点垂直间距\r
  spacingVertical: 5\r
  # 节点内部边距\r
  paddingX: 8\r
  # 图形的窗口填充率\r
  fitRatio: 0.95\r
  # 展开的最大节点级别（-1则展开全部）\r
  initialExpandLevel: -1\r
  # 多少级开始固定分支颜色\r
  colorFreezeLevel: 6\r
  # 颜色\r
  color: ["#4E79A7", "#F28E2C", "#E15759", "#76B7B2", "#59A14F", "#EDC949", "#AF7AA1", "#FF9DA7", "#9C755F", "#BAB0AB"]\r
  # 动画持续时间\r
  duration: 500\r
  # 图形高度\r
  height: 300px\r
  # 背景色\r
  backgroundColor: "#F8F8F8"\r
---\r
\r
## Links\r
\r
- [Website](https://markmap.js.org/)\r
- [GitHub](https://github.com/gera2ld/markmap)\r
\r
## Features\r
\r
Note that if blocks and lists appear at the same level, the lists will be ignored.\r
\r
### Lists\r
\r
- **strong** ~~del~~ *italic* ==highlight==\r
- `inline code`\r
- [x] checkbox\r
- Katex: $x = {-b \\pm \\sqrt{b^2-4ac} \\over 2a}$ <!-- markmap: fold -->\r
  - [More Katex Examples](#?d=gist:af76a4c245b302206b16aec503dbe07b:katex.md)\r
- Now we can wrap very very very very long text based on `maxWidth` option\r
\r
### Blocks\r
\r
| Products | Price |\r
|-|-|\r
| Apple | 4 |\r
| Banana | 2 |\r
"""

